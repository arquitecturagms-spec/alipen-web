<script>
    // Esta función actualiza el nombre del archivo en la interfaz
    document.getElementById('input-foto').addEventListener('change', function(e) {
        if(e.target.files[0]) {
            document.getElementById('file-name').innerText = e.target.files[0].name;
        }
    });

    async function procesarImagen() {
        const fileInput = document.getElementById('input-foto');
        const btn = document.getElementById('btn-generar');
        const loading = document.getElementById('loading');
        const imgDisplay = document.getElementById('resultado-img');

        if (fileInput.files.length === 0) {
            alert("Por favor, selecciona una imagen de tu proyecto.");
            return;
        }

        btn.disabled = true;
        loading.style.display = "block";
        imgDisplay.style.display = "none";

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        try {
            // URL conectada a tu motor Alipen IA
            const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/remodelar", {
                method: "POST",
                body: formData,
                mode: 'cors',
                headers: {
                    "Accept": "image/*, application/json"
                }
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || "Error en el servidor");
            }

            const blob = await response.blob();
            const imageUrl = URL.createObjectURL(blob);
            
            imgDisplay.src = imageUrl;
            imgDisplay.style.display = "block";

        } catch (error) {
            console.error("Detalle del error:", error);
            alert("Error de comunicación: " + error.message);
        } finally {
            btn.disabled = false;
            loading.style.display = "none";
        }
    }
</script>
