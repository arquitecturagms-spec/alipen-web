<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alipen IA - Diseño de Espacios</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f8f9fa; color: #333; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: 40px auto; }
        h1 { color: #007bff; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .upload-box { border: 2px dashed #007bff; padding: 20px; border-radius: 10px; background: #f0f7ff; margin-bottom: 20px; }
        input[type="file"] { margin-bottom: 10px; cursor: pointer; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; width: 100%; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #loading { display: none; margin-top: 20px; font-style: italic; color: #555; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: #007bff; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #resultado-container { margin-top: 30px; }
        img { max-width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Alipen IA</h1>
        <p>Sube una foto de tu fachada o habitación y la IA diseñará una propuesta contemporánea.</p>
        
        <div class="upload-box">
            <input type="file" id="input-foto" accept="image/*">
        </div>

        <button id="btn-generar" onclick="generarDiseno()">Generar Nuevo Diseño</button>

        <div id="loading">
            <div class="spinner"></div> 
            <strong>Procesando tu diseño...</strong> <br>
            Esto tarda unos 30-40 segundos. Por favor, no cierres la ventana.
        </div>

        <div id="resultado-container"></div>
    </div>

    <script type="module">
        // Importamos la librería de Gradio para conectar con Hugging Face
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        window.generarDiseno = async function() {
            const fileInput = document.getElementById('input-foto');
            const btn = document.getElementById('btn-generar');
            const loading = document.getElementById('loading');
            const resultadoDiv = document.getElementById('resultado-container');

            // 1. Validación de archivo
            if (fileInput.files.length === 0) {
                alert("Por favor, selecciona una foto de tu equipo.");
                return;
            }

            // 2. Interfaz en modo "Cargando"
            btn.disabled = true;
            loading.style.display = "block";
            resultadoDiv.innerHTML = "";

            try {
                // 3. Conexión al Space (Nombre exacto según tus capturas)
                const app = await Client.connect("Alipen-arte/mi-disenador-ia");
                
                // 4. Enviamos la imagen a la función de predicción
                // Nota: Enviamos el archivo directamente en un array []
                const result = await app.predict("/predict", [
                    fileInput.files[0], 
                ]);

                // 5. Procesamos el resultado
                if (result.data && result.data[0]) {
                    const imgData = result.data[0];
                    // Si el resultado es un objeto con URL o un string directo
                    const imgUrl = typeof imgData === 'string' ? imgData : imgData.url;

                    resultadoDiv.innerHTML = "<h3>¡Propuesta de diseño lista!</h3>";
                    const img = document.createElement("img");
                    img.src = imgUrl;
                    resultadoDiv.appendChild(img);
                } else {
                    throw new Error("La IA no devolvió ninguna imagen.");
                }

            } catch (error) {
                console.error("Error en la conexión:", error);
                alert("Error: El Space de IA está apagado o hay mucha gente usándolo. Verifica que en Hugging Face aparezca en 'Running'.");
            } finally {
                // 6. Restauramos el botón
                btn.disabled = false;
                loading.style.display = "none";
            }
        }
    </script>
</body>
</html>
