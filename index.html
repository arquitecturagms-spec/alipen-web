<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alipen IA - Generador</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        #loading { display: none; color: blue; font-weight: bold; margin-top: 20px; }
        img { max-width: 100%; margin-top: 20px; border-radius: 10px; }
        button { background: #3498db; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h1>Alipen IA</h1>
    <p>Selecciona la imagen de tu proyecto</p>
    <input type="file" id="input-foto" accept="image/*"><br><br>
    <button id="btn-generar" onclick="procesarImagen()">GENERAR DISEÑO</button>
    
    <div id="loading">Procesando... por favor espera.</div>
    <div id="resultado"></div>
</div>

<script>
async function procesarImagen() {
    const fileInput = document.getElementById('input-foto');
    const btn = document.getElementById('btn-generar');
    const loading = document.getElementById('loading');
    const resDiv = document.getElementById('resultado');

    if (fileInput.files.length === 0) return alert("Selecciona una foto.");

    btn.disabled = true;
    loading.style.display = "block";
    resDiv.innerHTML = "";

    const formData = new FormData();
    formData.append('image', fileInput.files[0]);

    try {
        const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/remodelar", {
            method: "POST",
            body: formData,
            mode: 'cors'
        });

        if (!response.ok) throw new Error("Error en el servidor");

        const blob = await response.blob();
        const url = URL.createObjectURL(blob);
        resDiv.innerHTML = `<img src="${url}">`;

    } catch (error) {
        console.error(error);
        alert("Error de conexión. Verifica que Hugging Face esté en 'Running'.");
    } finally {
        btn.disabled = false;
        loading.style.display = "none";
    }
}
</script>

</body>
</html>
