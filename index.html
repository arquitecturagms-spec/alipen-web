<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alipen IA - Generador</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; width: 80%; max-width: 500px; }
        #loading { display: none; color: blue; font-weight: bold; margin-top: 20px; }
        img { max-width: 100%; margin-top: 20px; border-radius: 10px; border: 2px solid #ddd; }
        button { background: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="box">
    <h1>Alipen IA</h1>
    <p>Selecciona la imagen de tu proyecto (Fachada, Cocina, etc.)</p>
    <input type="file" id="input-foto" accept="image/*"><br><br>
    <button id="btn-generar" onclick="procesarImagen()">GENERAR DISEÑO</button>
    
    <div id="loading">El arquitecto IA está trabajando... por favor espera.</div>
    <div id="resultado"></div>
</div>

<script>
// Función para convertir la imagen a un formato que la IA entienda
const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
});

async function procesarImagen() {
    const fileInput = document.getElementById('input-foto');
    const btn = document.getElementById('btn-generar');
    const loading = document.getElementById('loading');
    const resDiv = document.getElementById('resultado');

    if (fileInput.files.length === 0) return alert("Por favor, selecciona una foto primero.");

    btn.disabled = true;
    loading.style.display = "block";
    resDiv.innerHTML = "";

    try {
        // 1. Convertimos la imagen
        const imagenBase64 = await toBase64(fileInput.files[0]);

        // 2. Enviamos a Hugging Face (URL corregida y formato JSON)
        const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/run/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                data: [
                    imagenBase64, 
                    "una fachada moderna de lujo, diseño arquitectónico profesional" // Tu instrucción para la IA
                ]
            })
        });

        if (!response.ok) throw new Error("Servidor ocupado o apagado");

        const result = await response.json();
        
        // 3. Mostramos el resultado (Hugging Face devuelve la imagen en data[0])
        const finalImg = result.data[0];
        resDiv.innerHTML = `<h3>Resultado:</h3><img src="${finalImg}">`;

    } catch (error) {
        console.error(error);
        alert("Error de conexión. Asegúrate de que en Hugging Face diga 'Running' en verde.");
    } finally {
        btn.disabled = false;
        loading.style.display = "none";
    }
}
</script>
</body>
</html>
