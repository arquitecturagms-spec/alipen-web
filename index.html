<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alipen IA - Diseño Arquitectónico</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding: 20px; background-color: #f4f7f6; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        .upload-area { border: 2px dashed #007bff; padding: 20px; border-radius: 10px; margin-bottom: 20px; background: #fdfdfd; }
        button { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        #loading { display: none; margin-top: 20px; color: #555; font-weight: bold; }
        img { max-width: 100%; border-radius: 10px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Alipen IA</h1>
        <p>Sube la foto de tu proyecto para rediseñarlo.</p>
        <div class="upload-area">
            <input type="file" id="input-foto" accept="image/*">
        </div>
        <button id="btn-generar" onclick="generarDiseno()">GENERAR NUEVO DISEÑO</button>
        <div id="loading">🚀 Procesando diseño... (40 seg aprox.)</div>
        <div id="resultado"></div>
    </div>

    <script>
        async function generarDiseno() {
            const file = document.getElementById('input-foto').files[0];
            const btn = document.getElementById('btn-generar');
            const loading = document.getElementById('loading');
            const resDiv = document.getElementById('resultado');

            if (!file) return alert("Selecciona una foto primero.");

            btn.disabled = true;
            loading.style.display = "block";
            resDiv.innerHTML = "";

            const formData = new FormData();
            formData.append('image', file);

            try {
                // URL CONSTRUIDA SEGÚN TU SPACE ACTUAL
                const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/remodelar", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Error en el servidor de IA");

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                resDiv.innerHTML = `<img src="${url}" alt="Diseño generado">`;
            } catch (e) {
                console.error(e);
                alert("Error de conexión. Verifica que el Space esté en 'Running'.");
            } finally {
                btn.disabled = false;
                loading.style.display = "none";
            }
        }
    </script>
</body>
</html>
