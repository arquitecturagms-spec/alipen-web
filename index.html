<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alipen IA - Diseño Arquitectónico</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
        }
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 { color: var(--primary); margin-bottom: 5px; }
        p { color: #7f8c8d; margin-bottom: 30px; font-size: 14px; }
        
        .upload-area {
            border: 2px dashed #bdc3c7;
            padding: 40px 20px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 20px;
        }
        .upload-area:hover {
            border-color: var(--accent);
            background-color: #f0f8ff;
        }
        
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            width: 100%;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        #loading {
            display: none;
            margin-top: 20px;
            font-weight: bold;
            color: var(--primary);
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: var(--accent);
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #resultado-img {
            margin-top: 25px;
            max-width: 100%;
            border-radius: 10px;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Alipen IA</h1>
    <p>Visualización técnica y remodelación arquitectónica</p>

    <div class="upload-area" onclick="document.getElementById('input-foto').click()">
        <input type="file" id="input-foto" accept="image/*" style="display:none">
        <div id="upload-label">Click para subir foto de fachada o interior</div>
    </div>

    <button id="btn-generar" onclick="procesarImagen()">GENERAR NUEVA PROPUESTA</button>

    <div id="loading">
        <div class="spinner"></div>
        Procesando diseño...<br>
        <small>Analizando estructura técnica</small>
    </div>

    <img id="resultado-img" src="" alt="Resultado">
</div>

<script>
    // Mostrar nombre del archivo seleccionado
    document.getElementById('input-foto').onchange = function() {
        if(this.files[0]) {
            document.getElementById('upload-label').innerHTML = "<b>Archivo:</b> " + this.files[0].name;
        }
    };

    async function procesarImagen() {
        const fileInput = document.getElementById('input-foto');
        const btn = document.getElementById('btn-generar');
        const loading = document.getElementById('loading');
        const imgDisplay = document.getElementById('resultado-img');

        if (fileInput.files.length === 0) {
            alert("Por favor, selecciona una imagen primero.");
            return;
        }

        // Estado de carga
        btn.disabled = true;
        loading.style.display = "block";
        imgDisplay.style.display = "none";

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        try {
            // URL de tu Space en Hugging Face
            const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/remodelar", {
                method: "POST",
                body: formData,
                mode: 'cors'
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error("Error en el servidor de IA");
            }

            const blob = await response.blob();
            const imageUrl = URL.createObjectURL(blob);
            
            imgDisplay.src = imageUrl;
            imgDisplay.style.display = "block";

        } catch (error) {
            console.error("Error:", error);
            alert("Error de comunicación. Asegúrate de que Hugging Face diga 'Running'.");
        } finally {
            btn.disabled = false;
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
