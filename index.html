<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alipen IA - Diseño de Espacios</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background-color: #f8f9fa; color: #333; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 600px; margin: 40px auto; }
        h1 { color: #007bff; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        .upload-box { border: 2px dashed #007bff; padding: 20px; border-radius: 10px; background: #f0f7ff; margin-bottom: 20px; }
        input[type="file"] { margin-bottom: 10px; cursor: pointer; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; width: 100%; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #loading { display: none; margin-top: 20px; font-style: italic; color: #555; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 30px; height: 30px; border-radius: 50%; border-left-color: #007bff; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #resultado-container { margin-top: 30px; }
        img { max-width: 100%; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Alipen IA</h1>
        <p>Transforma tu fachada o interior con un diseño arquitectónico contemporáneo.</p>
        
        <div class="upload-box">
            <input type="file" id="input-foto" accept="image/*">
        </div>

        <button id="btn-generar" onclick="generarDiseno()">Generar Nuevo Diseño</button>

        <div id="loading">
            <div class="spinner"></div> 
            <strong>Procesando tu diseño...</strong> <br>
            Esto tarda unos 30-40 segundos.
        </div>

        <div id="resultado-container"></div>
    </div>

    <script>
        async function generarDiseno() {
            const fileInput = document.getElementById('input-foto');
            const btn = document.getElementById('btn-generar');
            const loading = document.getElementById('loading');
            const resultadoDiv = document.getElementById('resultado-container');

            if (fileInput.files.length === 0) {
                alert("Por favor, selecciona una foto.");
                return;
            }

            // Activar estado de carga
            btn.disabled = true;
            loading.style.display = "block";
            resultadoDiv.innerHTML = "";

            // Preparamos el formulario para enviar a tu app.py (Flask)
            const formData = new FormData();
            formData.append('image', fileInput.files[0]);
            // El prompt que tu Python enviará a Gemini
            formData.append('prompt', "Fachada contemporánea, materiales de lujo, estilo moderno");

            try {
                // LLAMADA A TU SPACE EN HUGGING FACE
                // Usamos la Direct URL + la ruta /remodelar que definiste en Python
                const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/remodelar", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) {
                    throw new Error("Error en el servidor de IA. Verifica los logs en Hugging Face.");
                }

                // Recibimos la imagen (blob)
                const blob = await response.blob();
                const imgUrl = URL.createObjectURL(blob);

                // Mostramos el resultado
                resultadoDiv.innerHTML = "<h3>¡Tu nuevo diseño está listo!</h3>";
                const img = document.createElement("img");
                img.src = imgUrl;
                resultadoDiv.appendChild(img);

            } catch (error) {
                console.error("Error detallado:", error);
                alert("No se pudo conectar con la IA. Asegúrate de que el Space esté en 'Running' (Verde).");
            } finally {
                btn.disabled = false;
                loading.style.display = "none";
            }
        }
    </script>
</body>
</html>
