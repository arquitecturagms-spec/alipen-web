<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alipen IA - Generador</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f4f4f4; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; width: 80%; max-width: 500px; }
        #loading { display: none; color: blue; font-weight: bold; margin-top: 20px; }
        img { max-width: 100%; margin-top: 20px; border-radius: 10px; border: 2px solid #ddd; }
        button { background: #3498db; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #ccc; }
    </style>
</head>
<body>

<div class="box">
    <h1>Alipen IA</h1>
    <p>Selecciona la imagen de tu proyecto (Fachada, Cocina, etc.)</p>
    <input type="file" id="input-foto" accept="image/*"><br><br>
    <button id="btn-generar" onclick="procesarImagen()">GENERAR DISEÑO</button>
    
    <div id="loading">El arquitecto IA está trabajando... por favor espera.</div>
    <div id="resultado"></div>
</div>

<script>
async function procesarImagen() {
    const fileInput = document.getElementById('input-foto');
    const btn = document.getElementById('btn-generar');
    const loading = document.getElementById('loading');
    const resDiv = document.getElementById('resultado');

    if (fileInput.files.length === 0) return alert("Por favor, selecciona una foto primero.");

    btn.disabled = true;
    loading.style.display = "block";
    resDiv.innerHTML = "";

    // Creamos el formulario para enviar la imagen real, no un texto Base64
    const formData = new FormData();
    formData.append('image', fileInput.files[0]);

    try {
        // URL corregida para apuntar a la ruta /remodelar de tu Flask
        const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/remodelar", {
            method: "POST",
            body: formData
            // No necesitamos headers de Content-Type, el navegador los pone solo con FormData
        });

        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(errorData.error || "Servidor ocupado");
        }

        // Como el servidor responde con una imagen (send_file), la convertimos a un objeto visual
        const blob = await response.blob();
        const urlImagen = URL.createObjectURL(blob);
        
        resDiv.innerHTML = `<h3>Resultado:</h3><img src="${urlImagen}">`;

    } catch (error) {
        console.error(error);
        alert("Error: " + error.message + ". Revisa que el Space esté en 'Running'.");
    } finally {
        btn.disabled = false;
        loading.style.display = "none";
    }
}
</script>
</body>
</html>
