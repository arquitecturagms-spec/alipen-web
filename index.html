<script>
    async function generarDiseno() {
        const fileInput = document.getElementById('input-foto');
        const btn = document.getElementById('btn-generar');
        const loading = document.getElementById('loading');
        const resultadoDiv = document.getElementById('resultado-container');

        if (fileInput.files.length === 0) {
            alert("Por favor, selecciona una foto.");
            return;
        }

        // Interfaz de carga
        btn.disabled = true;
        loading.style.display = "block";
        resultadoDiv.innerHTML = "";

        // Preparamos los datos para tu Flask en app.py
        const formData = new FormData();
        formData.append('image', fileInput.files[0]);
        formData.append('prompt', "Fachada contemporánea, hormigón visto, grandes ventanales, iluminación atardecer");

        try {
            // URL de tu Space (la dirección directa de la app Flask)
            // IMPORTANTE: Cambia 'Alipen-arte' y 'mi-disenador-ia' si no son exactos
            const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/remodelar", {
                method: "POST",
                body: formData
            });

            if (!response.ok) throw new Error("Error en la respuesta de la IA");

            // Como tu Python devuelve 'image/jpeg', convertimos el resultado a un link visual
            const blob = await response.blob();
            const imgUrl = URL.createObjectURL(blob);

            resultadoDiv.innerHTML = "<h3>¡Propuesta lista!</h3>";
            const img = document.createElement("img");
            img.src = imgUrl;
            img.style.maxWidth = "100%";
            resultadoDiv.appendChild(img);

        } catch (error) {
            console.error("Error:", error);
            alert("Hubo un problema. Asegúrate de que el Space esté en 'Running' y que la URL sea correcta.");
        } finally {
            btn.disabled = false;
            loading.style.display = "none";
        }
    }
</script>
