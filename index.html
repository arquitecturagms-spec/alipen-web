<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alipen IA - Renderizado Arquitectónico</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 450px; width: 100%; text-align: center; }
        h1 { color: var(--primary); margin-bottom: 10px; font-size: 24px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        .upload-box { border: 2px dashed #bdc3c7; padding: 30px; border-radius: 15px; margin-bottom: 25px; cursor: pointer; transition: 0.3s; }
        .upload-box:hover { border-color: var(--accent); background: #f9fbff; }
        input[type="file"] { width: 100%; }
        button { background: var(--accent); color: white; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #2980b9; transform: translateY(-2px); }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #loading { display: none; margin-top: 25px; color: var(--primary); font-weight: 500; }
        .spinner { border: 4px solid rgba(0,0,0,0.1); border-left-color: var(--accent); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #resultado-img { max-width: 100%; border-radius: 12px; margin-top: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Alipen IA</h1>
    <p>Transforma tus planos y fachadas con Inteligencia Artificial</p>
    
    <div class="upload-box" onclick="document.getElementById('input-foto').click()">
        <input type="file" id="input-foto" accept="image/*" style="display: none;">
        <span id="file-name">Click para subir imagen</span>
    </div>

    <button id="btn-generar" onclick="procesarImagen()">GENERAR NUEVA PROPUESTA</button>

    <div id="loading">
        <div class="spinner"></div>
        Procesando diseño técnico...<br>
        <small>(Esto toma unos 40 segundos)</small>
    </div>

    <img id="resultado-img" alt="Resultado del diseño">
</div>

<script>
    // Actualizar nombre del archivo al seleccionar
    document.getElementById('input-foto').addEventListener('change', function(e) {
        if(e.target.files[0]) document.getElementById('file-name').innerText = e.target.files[0].name;
    });

    async function procesarImagen() {
        const fileInput = document.getElementById('input-foto');
        const btn = document.getElementById('btn-generar');
        const loading = document.getElementById('loading');
        const imgDisplay = document.getElementById('resultado-img');

        if (fileInput.files.length === 0) {
            alert("Por favor, selecciona una imagen de tu proyecto.");
            return;
        }

        // Interfaz en modo carga
        btn.disabled = true;
        loading.style.display = "block";
        imgDisplay.style.display = "none";

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        try {
            // URL CONFIRMADA POR EL USUARIO
            const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/remodelar", {
                method: "POST",
                body: formData
            });

            if (!response.ok) {
                const errorLog = await response.json();
                throw new Error(errorLog.error || "Error en el servidor");
            }

            const blob = await response.blob();
            const imageUrl = URL.createObjectURL(blob);
            
            imgDisplay.src = imageUrl;
            imgDisplay.style.display = "block";

        } catch (error) {
            console.error("Error técnico:", error);
            alert("No se pudo conectar con la IA. Asegúrate de que el Space en Hugging Face esté 'Running' (Verde).");
        } finally {
            btn.disabled = false;
            loading.style.display = "none";
        }
    }
</script>

</body>
</html>
