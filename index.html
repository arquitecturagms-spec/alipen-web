<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alipen IA - Generador</title>
    
    <link rel="icon" href="data:,">

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 20px; background: #f0f2f5; color: #333; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: inline-block; width: 90%; max-width: 450px; margin-top: 20px; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 14px; }
        #input-foto { margin: 20px 0; width: 100%; }
        #btn-generar { background: #3498db; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: background 0.3s; }
        #btn-generar:hover { background: #2980b9; }
        #btn-generar:disabled { background: #bdc3c7; cursor: not-allowed; }
        #loading { display: none; color: #3498db; font-weight: bold; margin-top: 25px; font-style: italic; }
        #resultado { margin-top: 30px; }
        img { max-width: 100%; border-radius: 12px; border: 3px solid #ecf0f1; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-descargar { display: inline-block; margin-top: 15px; padding: 12px 20px; background: #27ae60; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>

    <script>
        // La función está aquí arriba para que siempre esté definida antes de tocar el botón
        async function procesarImagen() {
            const fileInput = document.getElementById('input-foto');
            const btn = document.getElementById('btn-generar');
            const loading = document.getElementById('loading');
            const resDiv = document.getElementById('resultado');

            if (!fileInput.files[0]) {
                alert("Por favor, selecciona una foto de tu fachada o proyecto.");
                return;
            }

            console.log("Iniciando proceso para:", fileInput.files[0].name);

            btn.disabled = true;
            loading.style.display = 'block';
            resDiv.innerHTML = '';

            const formData = new FormData();
            formData.append('image', fileInput.files[0]);

            try {
                const response = await fetch("https://alipen-arte-mi-disenador-ia.hf.space/remodelar", {
                    method: "POST",
                    body: formData
                });

                if (!response.ok) throw new Error("Servidor ocupado o apagado");

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);

                resDiv.innerHTML = `
                    <div style="padding: 10px; background: #e8f6f3; border-radius: 10px;">
                        <h3 style="color: #16a085;">¡Diseño Arquitectónico Listo!</h3>
                        <img src="${url}" alt="Resultado">
                        <br>
                        <a href="${url}" download="diseno-alipen.png" class="btn-descargar">💾 Descargar Imagen</a>
                    </div>
                `;

            } catch (error) {
                console.error("Error:", error);
                alert("Hubo un problema. Verifica que tu Space de Hugging Face esté activo (en verde).");
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        }
    </script>
</head>
<body>

<div class="box">
    <h1>Alipen IA</h1>
    <p>Sube la foto de una <b>fachada</b> o <b>interior</b> para transformarla con inteligencia artificial.</p>
    
    <input type="file" id="input-foto" accept="image/*">
    <br>
    <button id="btn-generar" onclick="procesarImagen()">GENERAR NUEVO DISEÑO</button>
    
    <div id="loading">✨ El arquitecto IA está diseñando tu proyecto...</div>
    <div id="resultado"></div>
</div>

</body>
</html>
